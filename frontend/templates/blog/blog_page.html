{% extends 'base.html' %}
{% load wagtailcore_tags %}

{% block 'content' %}

<section class="w-full bg-white border">
    <div class="px-2 py-2 font-semibold text-xl">
        Posts list:
    </div>
    <ul class="flex flex-col border last:border-b-0 m-5">
        {% for post in page.get_children %}
        <li class="px-2 py-2 border-b">
            <a href="{% pageurl post %}" class="">{{ post.title }}</a>
        </li>
        {% endfor %}
    </ul>

</section>

{% endblock %}
