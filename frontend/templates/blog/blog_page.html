{% extends 'base.html' %}
{% load wagtailcore_tags %}

{% block 'content' %}
    <h1>Title: {{ page.title }}</h1>
    <div class="intro">Description: {{ page.description }}</div>
    {% for post in page.get_children %}
        <a href="{% pageurl post %}">{{ post.title }}</a>
    {% endfor %}
{% endblock %}
